{% extends "base.html" %}
{% block title %}Taskify — Your Notebook{% endblock %}

{% block body %}
<div class="app-wrapper">
    <!-- ═══ HEADER ═══ -->
    <header class="app-header">
        <div class="header-left">
            <h1 class="logo" style="display: flex; align-items: center; gap: 8px;">
                <i data-lucide="list-todo" style="width: 36px; height: 36px; color: var(--primary-color, #4a90e2);"></i> 
                Taskify
            </h1>
        </div>
        <div class="header-right">
            <span class="greeting">Hey, <strong>{{ username }}</strong>!</span>
            <button id="dark-mode-toggle" class="btn btn-icon" title="Toggle Dark Mode"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                🌙
            </button>
            <a href="/logout" class="btn btn-secondary"
               style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
                Logout ✌️
            </a>
        </div>
    </header>

    <!-- ═══ ADD TASK SECTION ═══ -->
    <section class="add-task-section">
        <div class="add-task-card" style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
            <div class="tape"></div>
            <h2 class="section-title">Add a new task ✍️</h2>
            <form id="add-task-form">
                <div class="form-row">
                    <div class="form-group form-group--grow">
                        <label for="task-title">Title *</label>
                        <input type="text" id="task-title" placeholder="What needs to be done?" required
                               style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority"
                                style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                            <option value="Low">🟢 Low</option>
                            <option value="Medium" selected>🟡 Medium</option>
                            <option value="High">🔴 High</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group--grow">
                        <label for="task-desc">Description</label>
                        <input type="text" id="task-desc" placeholder="Optional details..."
                               style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
                    </div>
                    <div class="form-group">
                        <label for="task-category">Category</label>
                        <select id="task-category"
                                style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
                            <option value="Personal">🏠 Personal</option>
                            <option value="Work">💼 Work</option>
                            <option value="Study">📚 Study</option>
                            <option value="Health">💪 Health</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-due">Due Date</label>
                        <input type="date" id="task-due"
                               style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"
                        style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                    + Add Task
                </button>
            </form>
        </div>
    </section>

    <!-- ═══ FILTERS ═══ -->
    <section class="filters-section">
        <div class="filter-group">
            <label>Status:</label>
            <button class="filter-btn active" data-filter="status" data-value="all"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">All</button>
            <button class="filter-btn" data-filter="status" data-value="pending"
                    style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">Pending</button>
            <button class="filter-btn" data-filter="status" data-value="completed"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">Completed</button>
        </div>
        <div class="filter-group">
            <label>Priority:</label>
            <button class="filter-btn active" data-filter="priority" data-value="all"
                    style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">All</button>
            <button class="filter-btn" data-filter="priority" data-value="High"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">🔴 High</button>
            <button class="filter-btn" data-filter="priority" data-value="Medium"
                    style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">🟡 Medium</button>
            <button class="filter-btn" data-filter="priority" data-value="Low"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">🟢 Low</button>
        </div>
        <div class="filter-group">
            <label>Category:</label>
            <button class="filter-btn active" data-filter="category" data-value="all"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">All</button>
            <button class="filter-btn" data-filter="category" data-value="Personal"
                    style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">🏠</button>
            <button class="filter-btn" data-filter="category" data-value="Work"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">💼</button>
            <button class="filter-btn" data-filter="category" data-value="Study"
                    style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">📚</button>
            <button class="filter-btn" data-filter="category" data-value="Health"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">💪</button>
            <button class="filter-btn" data-filter="category" data-value="Other"
                    style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">📌</button>
        </div>
        <!-- Search -->
        <div class="filter-group filter-group--search">
            <label>Search:</label>
            <input type="text" id="search-input" placeholder="Search tasks..."
                   style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
        </div>
    </section>

    <!-- ═══ TASK LIST ═══ -->
    <section class="tasks-section">
        <div id="tasks-container" class="tasks-grid">
            <!-- Tasks rendered dynamically by JS -->
        </div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <span class="empty-icon">📋</span>
            <p>No tasks yet! Add one above to get started.</p>
        </div>
    </section>

    <!-- ═══ EDIT TASK MODAL ═══ -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card" style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
            <div class="tack"></div>
            <h2 class="section-title">Edit Task ✏️</h2>
            <form id="edit-task-form">
                <input type="hidden" id="edit-task-id">
                <div class="form-group">
                    <label for="edit-title">Title *</label>
                    <input type="text" id="edit-title" required
                           style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                </div>
                <div class="form-group">
                    <label for="edit-desc">Description</label>
                    <input type="text" id="edit-desc"
                           style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-priority">Priority</label>
                        <select id="edit-priority"
                                style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                            <option value="Low">🟢 Low</option>
                            <option value="Medium">🟡 Medium</option>
                            <option value="High">🔴 High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-category">Category</label>
                        <select id="edit-category"
                                style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
                            <option value="Personal">🏠 Personal</option>
                            <option value="Work">💼 Work</option>
                            <option value="Study">📚 Study</option>
                            <option value="Health">💪 Health</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-due">Due Date</label>
                        <input type="date" id="edit-due"
                               style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                    </div>
                </div>
                <div class="form-row" style="gap: 1rem;">
                    <button type="submit" class="btn btn-primary"
                            style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                        Save Changes ✓
                    </button>
                    <button type="button" id="cancel-edit" class="btn btn-secondary"
                            style="border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;">
                        Cancel ✗
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
