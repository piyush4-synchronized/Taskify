{% extends "base.html" %}
{% block title %}Login — Taskify{% endblock %}

{% block body %}
<div class="auth-page">
    <!-- Decorative scribbles -->
    <div class="deco-circle deco-circle--top-right"></div>
    <div class="deco-circle deco-circle--bottom-left"></div>

    <div class="auth-card" style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
        <!-- Tape decoration -->
        <div class="tape"></div>

        <h1 class="auth-title">Welcome back! ✏️</h1>
        <p class="auth-subtitle">Log in to your Taskify notebook</p>

        <div id="auth-error" class="error-msg" style="display:none;"></div>

        <form id="login-form" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="your-username" required
                       style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••" required
                       style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
            </div>
            <button type="submit" class="btn btn-primary"
                    style="border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;">
                Log In →
            </button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="/register">Sign up here!</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('auth-error');
    errorEl.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
            window.location.href = '/';
        } else {
            errorEl.textContent = data.error || 'Login failed.';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
});
</script>
{% endblock %}
